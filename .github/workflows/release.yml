name: Release CLI

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write

jobs:
  check-changesets:
    name: Check for changesets
    runs-on: ubuntu-latest
    outputs:
      hasChangesets: ${{ steps.check.outputs.hasChangesets }}
      shouldRelease: ${{ steps.check.outputs.shouldRelease }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Check for changesets
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Check if there are any changeset files (excluding README and config)
          CHANGESETS=$(find .changeset -name "*.md" ! -name "README.md" 2>/dev/null | wc -l)
          if [ "$CHANGESETS" -gt 0 ]; then
            echo "hasChangesets=true" >> $GITHUB_OUTPUT
            echo "shouldRelease=false" >> $GITHUB_OUTPUT
            echo "Found $CHANGESETS changeset(s)"
          else
            echo "hasChangesets=false" >> $GITHUB_OUTPUT
            # Check if this version is already released
            VERSION=$(node -p "require('./package.json').version")
            if gh release view "v${VERSION}" &>/dev/null; then
              echo "shouldRelease=false" >> $GITHUB_OUTPUT
              echo "Version v${VERSION} already released, skipping build"
            else
              echo "shouldRelease=true" >> $GITHUB_OUTPUT
              echo "Version v${VERSION} not yet released, will build and release"
            fi
          fi

  create-release-pr:
    name: Create Release PR
    needs: check-changesets
    if: needs.check-changesets.outputs.hasChangesets == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76 # v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Create Release Pull Request
        uses: changesets/action@v1
        with:
          version: bun changeset version
          title: "chore: release CLI"
          commit: "chore: release CLI"
        env:
          GITHUB_TOKEN: ${{ secrets.GH_CI_TOKEN || github.token }}

  build:
    name: Build CLI binaries
    needs: check-changesets
    if: needs.check-changesets.outputs.shouldRelease == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76 # v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build CLI binaries
        run: bun run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  sign-windows:
    name: Sign Windows binaries
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Download and setup CodeSignTool
        run: |
          curl -fsSL -o CodeSignTool.zip "https://www.ssl.com/download/codesigntool-for-linux-and-macos/"
          mkdir -p CodeSignTool
          unzip -o CodeSignTool.zip -d CodeSignTool

          # Debug: show what was extracted
          echo "Extracted contents:"
          find CodeSignTool -maxdepth 2 | head -20

          # Flatten any nested directory into CodeSignTool/
          if [ ! -f "CodeSignTool/CodeSignTool.sh" ]; then
            NESTED_DIR=$(find CodeSignTool -maxdepth 2 -name "CodeSignTool.sh" | head -1 | xargs -I{} dirname {})
            if [ -n "$NESTED_DIR" ] && [ "$NESTED_DIR" != "CodeSignTool" ]; then
              echo "Flattening from: $NESTED_DIR"
              mv "$NESTED_DIR"/* CodeSignTool/
            fi
          fi

          # Final check
          if [ ! -f "CodeSignTool/CodeSignTool.sh" ]; then
            echo "Error: CodeSignTool.sh not found after extraction"
            ls -la CodeSignTool/
            exit 1
          fi

          chmod +x CodeSignTool/CodeSignTool.sh
          rm CodeSignTool.zip

      - name: Sign Windows binaries
        env:
          WINDOWS_SIGN_USER_NAME: ${{ secrets.WINDOWS_SIGN_USER_NAME }}
          WINDOWS_SIGN_USER_PASSWORD: ${{ secrets.WINDOWS_SIGN_USER_PASSWORD }}
          WINDOWS_SIGN_CREDENTIAL_ID: ${{ secrets.WINDOWS_SIGN_CREDENTIAL_ID }}
          WINDOWS_SIGN_USER_TOTP: ${{ secrets.WINDOWS_SIGN_USER_TOTP }}
        run: |
          for dir in dist/workflowfiesta-windows-*/; do
            exe="${dir}bin/wf.exe"
            [ -f "$exe" ] || continue
            echo "Signing $(basename "$dir")/bin/wf.exe..."
            mkdir -p signed
            # cd into CodeSignTool so ./jar/... resolves correctly
            (cd CodeSignTool && ./CodeSignTool.sh sign \
              -input_file_path="$(pwd)/../$exe" \
              -output_dir_path="$(pwd)/../signed" \
              -credential_id="$WINDOWS_SIGN_CREDENTIAL_ID" \
              -username="$WINDOWS_SIGN_USER_NAME" \
              -password="$WINDOWS_SIGN_USER_PASSWORD" \
              -totp_secret="$WINDOWS_SIGN_USER_TOTP")
            mv "signed/wf.exe" "$exe"
            rm -rf signed
          done

      - name: Upload signed Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-signed
          path: dist/workflowfiesta-windows-*

  sign-darwin:
    name: Sign & notarize macOS binaries
    needs: build
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Import signing certificate
        env:
          CSC_LINK: ${{ secrets.mac_csc_link }}
          CSC_KEY_PASSWORD: ${{ secrets.mac_csc_key_password }}
        run: |
          if [ -z "$CSC_LINK" ]; then
            echo "::error::mac_csc_link secret is not set — skipping macOS signing"
            exit 1
          fi
          echo "$CSC_LINK" | base64 --decode > cert.p12
          KEYCHAIN="build.keychain"
          KEYCHAIN_PASS="actions"
          security create-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN"
          security default-keychain -s "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN"
          security set-keychain-settings -t 3600 "$KEYCHAIN"
          security import cert.p12 -k "$KEYCHAIN" -P "$CSC_KEY_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s \
            -k "$KEYCHAIN_PASS" "$KEYCHAIN"
          rm cert.p12
          # Auto-detect the Developer ID identity from the imported cert
          IDENTITY=$(security find-identity -v -p codesigning build.keychain | grep "Developer ID" | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "SIGNING_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"
          echo "Detected signing identity: $IDENTITY"

      - name: Sign binaries
        run: |
          for dir in dist/workflowfiesta-darwin-*/; do
            bin="${dir}bin/wf"
            [ -f "$bin" ] || continue
            echo "Signing $(basename "$dir")/bin/wf..."
            codesign --force --options runtime \
              --entitlements build/entitlements.mac.plist \
              --sign "$SIGNING_IDENTITY" \
              --timestamp \
              "$bin"
            codesign --verify --verbose "$bin"
          done

      - name: Prep notarization API key
        env:
          APPLE_API_KEY: ${{ secrets.apple_api_key }}
          APPLE_API_KEY_ID: ${{ secrets.apple_api_key_id }}
        run: |
          mkdir -p ~/private_keys/
          echo "$APPLE_API_KEY" > ~/private_keys/AuthKey_${APPLE_API_KEY_ID}.p8

      - name: Notarize binaries
        env:
          APPLE_API_KEY_ID: ${{ secrets.apple_api_key_id }}
          APPLE_API_KEY_ISSUER: ${{ secrets.apple_api_key_issuer_id }}
        run: |
          for dir in dist/workflowfiesta-darwin-*/; do
            bin="${dir}bin/wf"
            [ -f "$bin" ] || continue
            name="$(basename "$dir")"
            echo "Notarizing $name/bin/wf..."
            zip "${bin}.zip" "$bin"
            xcrun notarytool submit "${bin}.zip" \
              --key ~/private_keys/AuthKey_${APPLE_API_KEY_ID}.p8 \
              --key-id "$APPLE_API_KEY_ID" \
              --issuer "$APPLE_API_KEY_ISSUER" \
              --wait
            rm "${bin}.zip"
          done

      - name: Upload signed macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: darwin-signed
          path: dist/workflowfiesta-darwin-*

  publish:
    name: Publish release
    needs: [build, sign-windows, sign-darwin]
    if: ${{ !cancelled() && needs.build.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      # Download signed artifacts (prefer signed over unsigned)
      - name: Download signed Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-signed
          path: dist
        continue-on-error: true

      - name: Download signed macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: darwin-signed
          path: dist
        continue-on-error: true

      # Download full dist for Linux (unsigned) and any failed signing
      - name: Download all artifacts (fallback)
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist-fallback
        continue-on-error: true

      - name: Merge artifacts (prefer signed)
        run: |
          # Copy Linux binaries (no signing needed)
          for dir in dist-fallback/workflowfiesta-linux-*/; do
            [ -d "$dir" ] || continue
            cp -rn "$dir" dist/ 2>/dev/null || true
          done
          # Copy any missing Windows/macOS (if signing failed)
          for dir in dist-fallback/workflowfiesta-*/; do
            [ -d "$dir" ] || continue
            name="$(basename "$dir")"
            if [ ! -d "dist/$name" ]; then
              cp -r "$dir" "dist/"
            fi
          done
          rm -rf dist-fallback

      - name: Create GitHub Release and upload assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(node -p "require('./package.json').version")

          # Create tarballs for direct download (binary only)
          cd dist
          for dir in workflowfiesta-*/; do
            name="${dir%/}"
            tar -czf "${name}-v${VERSION}.tar.gz" -C "$name/bin" .
          done
          cd ..

          # Generate checksums
          cd dist
          sha256sum *.tar.gz > checksums.txt
          cd ..

          # Create GitHub release
          echo "Creating release v${VERSION}..."
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --generate-notes \
            dist/workflowfiesta-*-v${VERSION}.tar.gz \
            dist/checksums.txt

      - name: Upload checksums artifact
        uses: actions/upload-artifact@v4
        with:
          name: checksums
          path: dist/checksums.txt

      - name: Summary
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "## CLI Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Version | ${VERSION} |" >> $GITHUB_STEP_SUMMARY
          echo "| GitHub Release | v${VERSION} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          ls -la dist/*.tar.gz 2>/dev/null | awk '{print "- " $NF}' >> $GITHUB_STEP_SUMMARY || true

  update-homebrew:
    name: Update Homebrew tap
    needs: publish
    if: ${{ !cancelled() && needs.publish.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Download checksums artifact
        uses: actions/download-artifact@v4
        with:
          name: checksums
          path: .

      - name: Setup Bun
        uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76 # v2
        with:
          bun-version: latest

      - name: Generate and push Homebrew formula
        env:
          GH_TOKEN: ${{ secrets.GH_CI_TOKEN || github.token }}
        run: |
          VERSION=$(node -p "require('./package.json').version")

          # Parse checksums from artifact and export as env vars
          export DARWIN_ARM64_SHA256=$(grep "darwin-arm64" checksums.txt | awk '{print $1}')
          export DARWIN_X64_SHA256=$(grep "darwin-x64-v" checksums.txt | awk '{print $1}')
          export LINUX_ARM64_SHA256=$(grep "linux-arm64" checksums.txt | awk '{print $1}')
          export LINUX_X64_SHA256=$(grep "linux-x64-v" checksums.txt | awk '{print $1}')

          # Generate the formula
          bun run scripts/generate-homebrew-formula.ts "${VERSION}" workflowfiesta.rb

          echo "Generated formula:"
          cat workflowfiesta.rb

          # Check if file already exists and compare
          EXISTING=$(gh api repos/fiestatools/homebrew-tap/contents/Formula/workflowfiesta.rb --jq '.content' 2>/dev/null | base64 -d || echo "")
          NEW=$(cat workflowfiesta.rb)

          if [ "$EXISTING" = "$NEW" ]; then
            echo "No changes to Homebrew formula"
            exit 0
          fi

          # Get the SHA of existing file (needed for update)
          SHA=$(gh api repos/fiestatools/homebrew-tap/contents/Formula/workflowfiesta.rb --jq '.sha' 2>/dev/null || echo "")

          # Create or update the formula file
          if [ -n "$SHA" ]; then
            # Update existing file
            gh api repos/fiestatools/homebrew-tap/contents/Formula/workflowfiesta.rb \
              --method PUT \
              -f message="Update workflowfiesta to v${VERSION}" \
              -f content="$(base64 -w0 workflowfiesta.rb)" \
              -f sha="$SHA"
          else
            # Create new file
            gh api repos/fiestatools/homebrew-tap/contents/Formula/workflowfiesta.rb \
              --method PUT \
              -f message="Add workflowfiesta v${VERSION}" \
              -f content="$(base64 -w0 workflowfiesta.rb)"
          fi

          echo "Homebrew tap updated to v${VERSION}"

      - name: Summary
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "## Homebrew Tap Updated" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Formula updated to v${VERSION}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Install with:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "brew install fiestatools/tap/workflowfiesta" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
