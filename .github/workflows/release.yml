name: Release CLI

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76 # v2
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun install

      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@c8bada60c408975afd1a20b3db81d6eee6c5f621 # v1
        with:
          version: bun changeset version
          publish: bun run release:publish
          title: "chore: release CLI"
          commit: "chore: release CLI"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Build CLI binaries
        if: steps.changesets.outputs.published == 'true'
        run: bun run build

      - name: Create GitHub Release with assets
        if: steps.changesets.outputs.published == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./package.json').version")

          # Create tarballs for direct download
          cd dist
          for dir in cli-*/; do
            name="${dir%/}"
            tar -czf "${name}-v${VERSION}.tar.gz" "$name"
          done
          cd ..

          # Check if release already exists, if so upload assets to it
          if gh release view "v${VERSION}" &>/dev/null; then
            echo "Release v${VERSION} exists, uploading assets..."
            gh release upload "v${VERSION}" dist/cli-*-v${VERSION}.tar.gz --clobber
          else
            echo "Creating release v${VERSION}..."
            gh release create "v${VERSION}" \
              --title "v${VERSION}" \
              --notes "## WorkflowFiesta CLI v${VERSION}

          ### Installation

          **Via npm (recommended):**
          \`\`\`bash
          npm install -g @workflowfiesta/cli@${VERSION}
          \`\`\`

          **Via direct download:**
          Download the appropriate binary for your platform from the assets below.

          | Platform | Architecture | File |
          |----------|--------------|------|
          | macOS | Apple Silicon (M1/M2/M3) | cli-darwin-arm64 |
          | macOS | Intel | cli-darwin-x64 |
          | Linux | ARM64 | cli-linux-arm64 |
          | Linux | x64 | cli-linux-x64 |
          | Windows | ARM64 | cli-windows-arm64 |
          | Windows | x64 | cli-windows-x64 |

          ### Usage
          \`\`\`bash
          wf --help
          wf chat
          wf auth login --token <your-token>
          \`\`\`" \
              dist/cli-*-v${VERSION}.tar.gz
          fi

      - name: Summary
        if: steps.changesets.outputs.published == 'true'
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "## CLI Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Version | ${VERSION} |" >> $GITHUB_STEP_SUMMARY
          echo "| npm Package | @workflowfiesta/cli |" >> $GITHUB_STEP_SUMMARY
          echo "| Published | ${{ steps.changesets.outputs.published }} |" >> $GITHUB_STEP_SUMMARY
