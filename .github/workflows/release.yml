name: Release CLI

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76 # v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Create Release Pull Request
        id: changesets
        uses: changesets/action@v2.0.0-next.3
        with:
          github-token: ${{ secrets.GH_CI_TOKEN }}
          version-script: bun changeset version
          pr-title: "chore: release CLI"
          commit-message: "chore: release CLI"
          commit-mode: github-api

      - name: Build CLI binaries
        if: steps.changesets.outputs.hasChangesets == 'false'
        run: bun run build

      - name: Create GitHub Release and upload assets
        if: steps.changesets.outputs.hasChangesets == 'false'
        env:
          GH_TOKEN: ${{ secrets.GH_CI_TOKEN }}
        run: |
          VERSION=$(node -p "require('./package.json').version")

          # Create tarballs for direct download
          cd dist
          for dir in cli-*/; do
            name="${dir%/}"
            tar -czf "${name}-v${VERSION}.tar.gz" "$name"
          done
          cd ..

          # Create or update GitHub release
          if gh release view "v${VERSION}" &>/dev/null; then
            echo "Release v${VERSION} exists, uploading assets..."
            gh release upload "v${VERSION}" dist/cli-*-v${VERSION}.tar.gz --clobber
          else
            echo "Creating release v${VERSION}..."
            gh release create "v${VERSION}" \
              --title "v${VERSION}" \
              --generate-notes \
              dist/cli-*-v${VERSION}.tar.gz
          fi

      - name: Summary
        if: steps.changesets.outputs.hasChangesets == 'false'
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "## CLI Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Version | ${VERSION} |" >> $GITHUB_STEP_SUMMARY
          echo "| GitHub Release | v${VERSION} |" >> $GITHUB_STEP_SUMMARY
