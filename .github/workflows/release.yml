name: Release CLI

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: "Version bump type"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major
      channel:
        description: "Release channel"
        required: true
        default: "beta"
        type: choice
        options:
          - beta
          - latest
      dry_run:
        description: "Dry run (build only, no publish)"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76 # v2
        with:
          bun-version: latest

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun install

      - name: Bump version
        id: version
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          npm version ${{ github.event.inputs.version_bump }} --no-git-tag-version
          NEW=$(node -p "require('./package.json').version")
          echo "version=$NEW" >> $GITHUB_OUTPUT
          echo "Bumped version: $CURRENT -> $NEW"

      - name: Build CLI binaries
        run: bun run build

      - name: List built artifacts
        run: ls -la dist/

      - name: Publish to npm
        if: ${{ github.event.inputs.dry_run == 'false' }}
        run: bun run publish ${{ github.event.inputs.channel == 'latest' && '--latest' || '' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Commit version bump
        if: ${{ github.event.inputs.dry_run == 'false' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json bun.lock
          git commit -m "chore: release v${{ steps.version.outputs.version }}"
          git push

      - name: Create GitHub Release
        if: ${{ github.event.inputs.dry_run == 'false' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          CHANNEL="${{ github.event.inputs.channel }}"

          # Create tarballs for direct download
          cd dist
          for dir in cli-*/; do
            name="${dir%/}"
            tar -czf "${name}-v${VERSION}.tar.gz" "$name"
          done
          cd ..

          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --notes "## WorkflowFiesta CLI v${VERSION}

          ### Installation

          **Via npm (recommended):**
          \`\`\`bash
          npm install -g @workflowfiesta/cli@${VERSION}
          \`\`\`

          **Via direct download:**
          Download the appropriate binary for your platform from the assets below.

          | Platform | Architecture | File |
          |----------|--------------|------|
          | macOS | Apple Silicon (M1/M2/M3) | cli-darwin-arm64 |
          | macOS | Intel | cli-darwin-x64 |
          | Linux | ARM64 | cli-linux-arm64 |
          | Linux | x64 | cli-linux-x64 |
          | Windows | ARM64 | cli-windows-arm64 |
          | Windows | x64 | cli-windows-x64 |

          ### Usage
          \`\`\`bash
          wf --help
          wf chat
          wf auth login --token <your-token>
          \`\`\`

          ### Release Channel
          This release is tagged as \`${CHANNEL}\`." \
            dist/cli-*-v${VERSION}.tar.gz

      - name: Summary
        run: |
          echo "## CLI Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Version | ${{ steps.version.outputs.version }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Channel | ${{ github.event.inputs.channel }} |" >> $GITHUB_STEP_SUMMARY
          echo "| npm Package | @workflowfiesta/cli |" >> $GITHUB_STEP_SUMMARY
          echo "| Dry Run | ${{ github.event.inputs.dry_run }} |" >> $GITHUB_STEP_SUMMARY
